<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <title>Nexcent</title>
  </head>
  <body>
    <header>
      <div class="header-inter">
        <a href="" class="logo">
          <img src="./images/logo.png" alt="Nexcent logo" />
        </a>
        <nav>
          <a href="">Home</a>
          <a href="">Services</a>
          <a href="">Feature</a>
          <a href="">Product</a>
          <a href="">Testimonial</a>
          <a href="">FAQ</a>
        </nav>
        <div class="action-group">
          <a href="" class="logo-link">Logo</a>
          <a href="" class="signup-btn">Signup</a>
        </div>
      </div>
    </header>
    <!-- Banner Section -->
    <section class="Banner">
      <div class="hero-frameone">
        <h1 class="lessons">Lessons and insights</h1>
        <h1 class="years">from 8 years</h1>
        <p class="text">
          Where to grow your business as a photographer: site or social media?
        </p>
        <button class="register">Register</button>
      </div>
      <div class="hero-img">
        <img src="./images/Illustration.png" alt="Illustration Logo" />
      </div>
    </section>

    <!-- Banner Section -->

    <!-- Our Client Section -->
    <section class="client">
      <div class="our-client">
        <h2 class="from">Our Client</h2>
        <p class="text">We have been working with some Fortune 500+ clients</p>
      </div>
      <div class="logo-our">
        <img src="./images/logo_client/logo1.png" alt="" />
        <img src="./images/logo_client/logo2.png" alt="" />
        <img src="./images/logo_client/logo3.png" alt="" />
        <img src="./images/logo_client/logo4.png" alt="" />
        <img src="./images/logo_client/logo5.png" alt="" />
        <img src="./images/logo_client/logo6.png" alt="" />
        <img src="./images/logo_client/log7.png" alt="" />
      </div>
    </section>
    <!-- Our Client Section -->

    <!-- System Section -->

    <section class="system"></section>
    <!-- System Section -->

    <!-- Unlock Section -->
    <section class="unlock"></section>
    <!-- Unlock Section -->

    <!-- Achievement Section -->
    <section class="achievement"></section>
    <!-- Achievement Section -->

    <!-- Customers Section -->
    <section class="customers"></section>
    <!-- Customers Section -->

    <!-- Community Section -->
    <section class="community"></section>
    <!-- Community Section -->
  </body>
</html>
